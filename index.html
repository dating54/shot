<script>
    // ডাটাবেজ
    let links = JSON.parse(localStorage.getItem('adultLinks') || '[]');
    
    // আইপি পাওয়ার ফাংশন
    async function getIP() {
        try {
            const res = await fetch('https://api.ipify.org?format=json');
            const data = await res.json();
            document.getElementById('ipAddress').textContent = data.ip;
            return data.ip;
        } catch {
            document.getElementById('ipAddress').textContent = '192.168.1.5';
            return '192.168.1.5';
        }
    }
    
    // কোড জেনারেট
    function generateCode() {
        return Math.random().toString(36).substring(2, 8);
    }
    
    // লিংক জেনারেট
    async function generateLink() {
        const url = document.getElementById('urlInput').value.trim();
        
        if(!url) {
            alert('Please enter a URL!');
            return;
        }
        
        // URL ফরম্যাট
        let finalUrl = url;
        if(!url.startsWith('http')) {
            finalUrl = 'https://' + url;
        }
        
        // গুরুত্বপূর্ণ: GitHub Pages URL ব্যবহার করুন, আইপি না
        const baseUrl = window.location.origin + window.location.pathname.replace('index.html', '');
        const code = generateCode();
        const shortUrl = baseUrl + code;  // এটা হবে: https://username.github.io/adult-link-shortner/abc123
        
        // সেভ করুন
        links.push({
            code: code,
            original: finalUrl,
            time: Date.now(),
            clicks: 0
        });
        
        localStorage.setItem('adultLinks', JSON.stringify(links));
        
        // দেখান
        document.getElementById('shortLink').textContent = shortUrl;
        document.getElementById('output').style.display = 'block';
        
        // Snapchat-এর জন্য স্পেশাল নোট
        document.getElementById('snapchatNote').innerHTML = '📸 Snapchat-এ শেয়ার করুন: <strong>' + code + '</strong> (শুধু এই অংশ)';
    }
    
    // কপি করুন
    function copyLink() {
        const link = document.getElementById('shortLink').textContent;
        navigator.clipboard.writeText(link);
        alert('✅ Copied!');
    }
    
    // Snapchat কপি
    function copySnapchat() {
        const link = document.getElementById('shortLink').textContent;
        const snapchatLink = link.split('/').pop(); // শুধু abc123 অংশ নেয়
        navigator.clipboard.writeText(snapchatLink);
        alert('✅ Snapchat-এর জন্য কপি হয়েছে! শুধু ' + snapchatLink + ' পেস্ট করুন');
    }
    
    // রিডাইরেক্ট চেক
    function checkRedirect() {
        const path = window.location.pathname;
        const parts = path.split('/');
        const code = parts[parts.length - 1];
        
        // index.html বা খালি হলে রিটার্ন
        if(code === 'index.html' || code === '' || code.includes('.')) return;
        
        // কোড 6 ক্যারেক্টার চেক
        if(code && code.length === 6) {
            const found = links.find(l => l.code === code);
            if(found) {
                found.clicks++;
                localStorage.setItem('adultLinks', JSON.stringify(links));
                window.location.href = found.original;
            } else {
                console.log('Code not found:', code);
            }
        }
    }
    
    // পেজ লোড
    window.onload = function() {
        getIP();
        checkRedirect();
    };
</script>
