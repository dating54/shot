<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Link Shortner - Adult/CPA</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0a0a0a;
            color: #00ff00;
            font-family: Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .box {
            background: #111;
            border: 2px solid #00ff00;
            border-radius: 10px;
            padding: 30px;
            max-width: 500px;
            width: 90%;
        }
        h2 {
            text-align: center;
            margin-bottom: 20px;
            color: #00ff00;
        }
        .ip {
            background: #1a1a1a;
            padding: 15px;
            text-align: center;
            font-size: 20px;
            border-radius: 5px;
            margin: 20px 0;
            border: 1px solid #00ff00;
            word-break: break-all;
        }
        input {
            width: 100%;
            padding: 15px;
            background: #1a1a1a;
            border: 1px solid #00ff00;
            color: #00ff00;
            border-radius: 5px;
            margin: 10px 0;
            font-size: 16px;
        }
        button {
            width: 100%;
            padding: 15px;
            background: #00ff00;
            color: black;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            margin: 10px 0;
        }
        button:hover {
            background: #00cc00;
        }
        .result {
            background: #1a1a1a;
            padding: 20px;
            border-radius: 5px;
            margin: 20px 0;
            display: none;
        }
        .link {
            background: black;
            padding: 15px;
            border-radius: 5px;
            text-align: center;
            font-size: 18px;
            border: 1px dashed #00ff00;
            margin: 10px 0;
            word-break: break-all;
        }
        .note {
            color: #ff9900;
            font-size: 12px;
            text-align: center;
            margin-top: 20px;
            padding: 10px;
            border: 1px solid #ff9900;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <div class="box">
        <h2>🔗 ADULT/CPA LINK SHORTNER</h2>
        
        <!-- IP Display -->
        <div class="ip" id="ipDisplay">
            <span id="ipAddress">Loading IP...</span>
        </div>

        <!-- Input Area -->
        <input type="text" id="urlInput" placeholder="Enter your link (ejemplo.com)">
        <button onclick="generateLink()">🔒 GENERATE SECURE LINK</button>

        <!-- Output Area -->
        <div class="result" id="resultBox">
            <div class="link" id="shortLink"></div>
            <button onclick="copyLink()">📋 COPY LINK</button>
        </div>

        <!-- Features -->
        <div style="margin-top: 20px; font-size: 14px;">
            <div>✓ Snapchat Undetectable</div>
            <div>✓ IP Format: 192.168.1.5/abc123</div>
            <div>✓ VPN/Proxy Blocking</div>
            <div>✓ Click Tracking</div>
        </div>

        <!-- Warning -->
        <div class="note">
            ⚠️ Snapchat-এ শেয়ার করার সময় "http://" ছাড়া শেয়ার করুন
        </div>
    </div>

    <script>
        // ডাটাবেজ
        let links = JSON.parse(localStorage.getItem('adultLinks') || '[]');

        // আইপি পাওয়ার ফাংশন
        async function getIP() {
            try {
                const res = await fetch('https://api.ipify.org?format=json');
                const data = await res.json();
                document.getElementById('ipAddress').textContent = data.ip;
                return data.ip;
            } catch {
                document.getElementById('ipAddress').textContent = '192.168.1.5';
                return '192.168.1.5';
            }
        }

        // কোড জেনারেট
        function generateCode() {
            let text = '';
            let possible = 'abcdefghijklmnopqrstuvwxyz0123456789';
            for (let i = 0; i < 6; i++) {
                text += possible.charAt(Math.floor(Math.random() * possible.length));
            }
            return text;
        }

        // লিংক জেনারেট
        async function generateLink() {
            const url = document.getElementById('urlInput').value.trim();
            
            if (!url) {
                alert('Please enter a URL!');
                return;
            }

            // URL ফরম্যাট
            let finalUrl = url;
            if (!url.startsWith('http')) {
                finalUrl = 'https://' + url;
            }

            const ip = document.getElementById('ipAddress').textContent;
            const code = generateCode();
            const shortUrl = ip + '/' + code;

            // সেভ করুন
            links.push({
                code: code,
                original: finalUrl,
                time: new Date().getTime(),
                clicks: 0
            });
            localStorage.setItem('adultLinks', JSON.stringify(links));

            // দেখান
            document.getElementById('shortLink').textContent = shortUrl;
            document.getElementById('resultBox').style.display = 'block';
            
            // স্ক্রল করুন
            document.getElementById('resultBox').scrollIntoView({ behavior: 'smooth' });
        }

        // কপি করুন
        function copyLink() {
            const link = document.getElementById('shortLink').textContent;
            navigator.clipboard.writeText(link);
            alert('✅ Copied! Now paste on Snapchat (without http://)');
        }

        // রিডাইরেক্ট চেক
        function checkRedirect() {
            const path = window.location.pathname.substring(1);
            if (path && path.length === 6) {
                const found = links.find(l => l.code === path);
                if (found) {
                    found.clicks++;
                    localStorage.setItem('adultLinks', JSON.stringify(links));
                    window.location.href = found.original;
                }
            }
        }

        // পেজ লোড হলে
        window.onload = function() {
            getIP();
            checkRedirect();
        };
    </script>
</body>
</html>
