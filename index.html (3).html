<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    <meta http-equiv="X-Frame-Options" content="DENY">
    <meta http-equiv="Referrer-Policy" content="no-referrer">
    <title>Secure Link System</title>
    <style>
        /* আপনার পুরানো কোডের CSS অংশ এখানে দিবেন */
        /* আমি আগের response এ যতটুকু CSS দিয়েছিলাম সব এখানে */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0a0a0a; color: #00ff00; font-family: 'Courier New', monospace; }
        .container { max-width: 800px; margin: 50px auto; padding: 20px; }
        /* ... বাকি CSS ... */
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>⚡ SECURE LINK SYSTEM 2.0</h1>
            <div class="status">● ONLINE</div>
        </div>
        
        <div class="ip-box" id="ipDisplay">
            <span id="ipAddress">192.168.1.5</span>
        </div>
        
        <div class="input-group">
            <input type="text" id="targetUrl" placeholder="Enter your link (ejemplo.com)">
            <button onclick="generateLink()">Generate Secure Link</button>
        </div>
        
        <div class="output" id="output" style="display: none;">
            <div class="link-box" id="generatedLink"></div>
            <button onclick="copyLink()">Copy Link</button>
        </div>
    </div>

    <script>
        // আগের response এর JavaScript অংশ এখানে
        let db = JSON.parse(localStorage.getItem('links') || '[]');
        
        async function getUserIP() {
            try {
                const res = await fetch('https://api.ipify.org?format=json');
                const data = await res.json();
                document.getElementById('ipAddress').textContent = data.ip;
                return data.ip;
            } catch {
                return '192.168.1.5';
            }
        }
        
        function generateCode() {
            return Math.random().toString(36).substring(2, 8);
        }
        
        async function generateLink() {
            const url = document.getElementById('targetUrl').value;
            const ip = document.getElementById('ipAddress').textContent;
            const code = generateCode();
            const shortLink = ip + '/' + code;
            
            // সেভ করুন
            db.push({
                code: code,
                original: url,
                created: new Date().toISOString(),
                clicks: 0
            });
            localStorage.setItem('links', JSON.stringify(db));
            
            // দেখান
            document.getElementById('generatedLink').textContent = shortLink;
            document.getElementById('output').style.display = 'block';
        }
        
        function copyLink() {
            const link = document.getElementById('generatedLink').textContent;
            navigator.clipboard.writeText(link);
            alert('✅ Copied! Now paste on Snapchat');
        }
        
        // চেক রিডাইরেক্ট
        function checkRedirect() {
            const path = window.location.pathname.substring(1);
            if(path && path.length === 6) {
                const found = db.find(l => l.code === path);
                if(found) {
                    found.clicks++;
                    localStorage.setItem('links', JSON.stringify(db));
                    window.location.href = found.original;
                }
            }
        }
        
        window.onload = async function() {
            await getUserIP();
            checkRedirect();
        };
    </script>
</body>
</html>
